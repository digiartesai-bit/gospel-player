<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#081826">
    
  <!-- Definições básicas do site -->
  <title>AdoraPlay</title>

  <!-- O TÍTULO que vai aparecer em negrito no compartilhamento -->
  <meta property="og:title" content="AdoraPlay — Conectando Corações na Adoração" />

  <!-- A DESCRIÇÃO que vai aparecer logo abaixo do título -->
  <meta property="og:description" content="Sua música. Sua adoração. Em qualquer lugar. Ouça seus louvores favoritos e sinta a presença de Deus." />

  <!-- O ENDEREÇO (link) do seu site -->
  <meta property="og:url" content="https://digiartesai-bit.github.io/adora-play/" />

  <!-- A IMAGEM de prévia (salve a imagem que criamos como 'preview.jpg' na pasta raiz do seu projeto) -->
  <meta property="og:image" content="https://digiartesai-bit.github.io/adora-play/socialpreview.png" />

  <!-- Tipo de página (indica que é um site) -->
  <meta property="og:type" content="website" />

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="topo" style="justify-content: center; text-align: center;">
    <div class="logo">
        <h1>AdoraPlay</h1>
        <p>Sua música. Sua adoração.</p>
    </div>
</header>

<!-- SEÇÃO: MAIS OUVIDAS (Ranking Global do Cloudflare KV) -->
<section class="secao" id="secaoMaisOuvidas" style="display: none;">
    <h3>Mais Ouvidas no Mundo</h3>
    <div id="maisOuvidas" style="white-space: nowrap; overflow-x: auto; padding-bottom: 10px;"></div>
</section>

<!-- SEÇÃO: SEUS FAVORITOS -->
<section class="secao" id="secaoFavoritos" style="display: none;">
    <h3>Seus Favoritos</h3>
    <div id="favoritosHorizontal" style="white-space: nowrap; overflow-x: auto; padding-bottom: 10px;"></div>
</section>

<!-- SEÇÃO: ÚLTIMAS OUVIDAS (Antigo Continue Ouvindo) -->
<section class="secao" id="secaoContinue" style="display: none;">
    <h3>Últimas ouvidas</h3>
    <div id="continueOuvindo" style="white-space: nowrap; overflow-x: auto; padding-bottom: 10px;"></div>
</section>

<!-- SEÇÃO DE ÁLBUNS E CATEGORIAS UNIFICADA -->
<section class="secao">
    <h3>Navegar por Álbuns</h3>
    <div id="albuns" style="white-space: nowrap; overflow-x: auto; padding-bottom: 10px;"></div>
</section>

<!-- LISTA PRINCIPAL (FILTRÁVEL) -->
<section class="secao">
    <h3 id="tituloListaMusicas">Adicionados recentemente</h3>
    <div id="listaMusicas"></div>
</section>

 <!-- MINI PLAYER UNIFICADO E PROTEGIDO CONTRA SOBREPOSIÇÃO -->
<div class="mini-player" id="miniPlayer" style="display: none; flex-direction: column; align-items: center; padding: 10px; gap: 8px;">

    <!-- Linha 1: Progresso -->
    <div class="progress-container" style="width: 100%; margin-bottom: 5px; position: relative; z-index: 10;">
        <input type="range" id="progressBar" value="0" min="0" max="100" style="width: 100%; cursor: pointer;">
        <div class="progress-times" style="display: flex; justify-content: space-between; font-size: 11px; color: #aaa; margin-top: 2px;">
            <span id="currentTime">0:00</span>
            <span id="durationTime">0:00</span>
        </div>
    </div>

    <!-- Linha 2: Informações da Música, Favorito e Controles -->
    <div class="player-controls-row" style="display: flex; width: 100%; align-items: center; justify-content: space-between; position: relative; z-index: 5;">
        
        <!-- Esquerda: Capa e Info -->
        <div style="display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0;">
            <img id="miniCapa" src="assets/icons/album.svg" onerror="this.src='assets/icons/album.svg'" alt="Capa" style="width: 45px; height: 45px; border-radius: 6px; object-fit: cover;">
            <div class="mini-info" style="display: flex; flex-direction: column; min-width: 0;">
                <strong id="miniTitulo" style="font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff;">Nenhuma música</strong>
                <small id="miniArtista" style="font-size: 12px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Selecione uma música</small>
            </div>
        </div>

        <!-- Centro: Botão de Favorito -->
        <button id="btnFavorito" onclick="toggleFavorito()" style="background: none; border: none; padding: 0; margin: 0 15px; cursor: pointer; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; flex-shrink: 0;">
            <img src="assets/icons/heart.svg" id="imgFavorito" alt="Favoritar" width="24" height="24" style="pointer-events: none; transition: transform 0.1s ease;">
        </button>

        <!-- Direita: Controles de Mídia -->
        <div class="mini-botoes" style="display: flex; align-items: center; gap: 8px; flex-shrink: 0;">
            
            <!-- Botão Shuffle -->
            <button id="btnShuffle" onclick="alternarShuffle()" style="background: none; border: none; padding: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent;">
                <img src="assets/icons/shuffle.svg" alt="Modo Aleatório" width="18" height="18" style="pointer-events: none;">
            </button>

            <!-- Botão Anterior -->
            <button onclick="anterior()" style="background: none; border: none; padding: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent;">
                <img src="assets/icons/previous.svg" alt="Anterior" width="20" height="20" style="pointer-events: none;">
            </button>

            <!-- Botão Play/Pause -->
            <button id="btnPlay" onclick="playPause()" style="background: none; border: none; padding: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent;">
                <img src="assets/icons/play.svg" alt="Reproduzir" width="24" height="24" style="pointer-events: none;">
            </button>

            <!-- Botão Próxima -->
            <button onclick="proxima()" style="background: none; border: none; padding: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent;">
                <img src="assets/icons/next.svg" alt="Próxima" width="20" height="20" style="pointer-events: none;">
            </button>

            <!-- Botão Repeat -->
            <button id="btnRepeat" onclick="alternarRepeat()" style="background: none; border: none; padding: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent;">
                <img src="assets/icons/repeat.svg" alt="Repetir" width="18" height="18" style="pointer-events: none;">
            </button>
            
        </div>
        
    </div>

</div>

<!-- MENU DE NAVEGAÇÃO INFERIOR -->
<nav class="menu">
    <button onclick="carregarTela()">
        <img src="assets/icons/home.svg" alt="Início" width="24" height="24"><br>
        <span>Início</span>
    </button>
    <button style="opacity: 0.35; cursor: default;" onclick="event.preventDefault();" tabindex="-1">
        <img src="assets/icons/library.svg" alt="Biblioteca" width="24" height="24"><br>
        <span>Biblioteca</span>
    </button>
    <button style="opacity: 0.35; cursor: default;" onclick="event.preventDefault();" tabindex="-1">
        <img src="assets/icons/profile.svg" alt="Perfil" width="24" height="24"><br>
        <span>Perfil</span>
    </button>
</nav>

<audio id="audioPlayer"></audio>
    <script src="js/player.js"></script>
<script src="js/app.js"></script>


</body>
</html>
