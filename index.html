<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#081826">

    <title>AdoraPlay</title>

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="topo">
    <div class="logo">
        <h1>AdoraPlay</h1>
        <p>Sua música. Sua adoração.</p>
    </div>

    <!-- Substituído o emoji de perfil pelo SVG correspondente -->
    <button class="perfil">
        <img src="assets/icons/profile.svg" alt="Perfil" width="24" height="24">
    </button>
</header>

<section class="pesquisa">
    <div class="campo-pesquisa" style="position: relative; display: flex; align-items: center;">
        <!-- Ícone de lupa posicionado dentro ou ao lado da barra de busca -->
        <img src="assets/icons/search.svg" alt="Buscar" class="icone-pesquisa" width="20" height="20" style="position: absolute; left: 12px; pointer-events: none;">
        <input type="search" placeholder="Buscar músicas..." style="padding-left: 40px; width: 100%;">
    </div>
</section>

<section class="banner">
    <h2>Álbum em Destaque</h2>
    <p>Ouça os lançamentos mais recentes.</p>
    <!-- Substituído o caractere ▶ pelo SVG play -->
    <button class="btn-banner">
        <img src="assets/icons/play.svg" alt="Play" width="16" height="16">
        <span>Ouvir Agora</span>
    </button>
</section>

<section class="secao">
    <h3>Continue ouvindo</h3>
    <div id="continueOuvindo"></div>
</section>

<!-- SEÇÃO DE ÁLBUNS E CATEGORIAS UNIFICADA -->
<section class="secao">
    <h3>Navegar por Álbuns</h3>
    <div id="albuns"></div>
</section>

<!-- LISTA QUE SERÁ FILTRADA -->
<section class="secao">
    <h3 id="tituloListaMusicas">Adicionados recentemente</h3>
    <div id="listaMusicas"></div>
</section>

<!-- MINI PLAYER UNIFICADO E CORRIGIDO -->
<div class="mini-player" id="miniPlayer">

    <!-- Se a música não tiver capa, você pode usar assets/icons/album.svg como fallback no seu JS -->
    <img id="miniCapa" src="https://placehold.co/60x60" alt="Capa">
    
    <div class="progress-container">
        <input type="range" id="progressBar" value="0" min="0" max="100">
        <div class="progress-times">
            <span id="currentTime">0:00</span>
            <span id="durationTime">0:00</span>
        </div>
    </div>

    <div class="mini-info">
        <strong id="miniTitulo">Nenhuma música</strong>
        <small id="miniArtista">Selecione uma música</small>
    </div>

    <!-- BOTÃO DE FAVORITO (ESTILO SPOTIFY, AO LADO DO TÍTULO) -->
    <!-- BOTÃO DE FAVORITO CORRIGIDO -->
<button id="btnFavorito" onclick="toggleFavorito()" style="background: none; border: none; padding: 0; margin: 0 15px; cursor: pointer; width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent;">
    <img src="assets/icons/heart.svg" id="imgFavorito" alt="Favoritar" width="24" height="24" style="pointer-events: none; transition: transform 0.1s ease;">
</button>

    <div class="mini-botoes">
        <!-- Botão Shuffle (Opcional) -->
        <button id="btnShuffle" onclick="alternarShuffle()">
            <img src="assets/icons/shuffle.svg" alt="Modo Aleatório" width="20" height="20">
        </button>

        <!-- Botão Anterior -->
        <button onclick="anterior()">
            <img src="assets/icons/previous.svg" alt="Anterior" width="22" height="22">
        </button>

        <!-- Botão Play/Pause dinâmico -->
        <button id="btnPlay" onclick="playPause()">
            <img src="assets/icons/play.svg" alt="Reproduzir" width="24" height="24">
        </button>

        <!-- Botão Próxima -->
        <button onclick="proxima()">
            <img src="assets/icons/next.svg" alt="Próxima" width="22" height="22">
        </button>

        <!-- Botão Repeat (Opcional) -->
        <button id="btnRepeat" onclick="alternarRepeat()">
            <img src="assets/icons/repeat.svg" alt="Repetir" width="20" height="20">
        </button>
    </div>

</div>

<!-- Menu de Navegação Inferior com SVGs elegantes -->
<nav class="menu">
    <button>
        <img src="assets/icons/home.svg" alt="Início" width="24" height="24"><br>
        <span>Início</span>
    </button>
    <button>
        <img src="assets/icons/search.svg" alt="Buscar" width="24" height="24"><br>
        <span>Buscar</span>
    </button>
    <button>
        <img src="assets/icons/heart.svg" alt="Favoritos" width="24" height="24"><br>
        <span>Favoritos</span>
    </button>
    <button>
        <img src="assets/icons/library.svg" alt="Biblioteca" width="24" height="24"><br>
        <span>Biblioteca</span>
    </button>
    <button>
        <img src="assets/icons/profile.svg" alt="Perfil" width="24" height="24"><br>
        <span>Perfil</span>
    </button>
</nav>

<audio id="audioPlayer"></audio>

<!-- Scripts com a ordem de carregamento ideal -->
<script src="js/app.js"></script>
<script src="js/player.js"></script>

</body>
</html>
