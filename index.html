<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#081826">
    
    <title>AdoraPlay</title>
    <meta name="description" content="Sua música. Sua adoração. Em qualquer lugar." />

    <!-- Protocolo Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://digiartesai-bit.github.io/adora-play/" />
    <meta property="og:title" content="AdoraPlay — Conectando Corações na Adoração" />
    <meta property="og:description" content="Sua música. Sua adoração. Em qualquer lugar." />
    <meta property="og:image" content="https://digiartesai-bit.github.io/adora-play/socialpreview.jpg" />
    
    <!-- Fonte Google: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- CABEÇALHO -->
<header class="topo">
    <div class="logo">
        <h1>AdoraPlay</h1>
        <p>Sua música. Sua adoração.</p>
    </div>
    <!-- Ícone de perfil moderno -->
    <button class="perfil">
        <img src="assets/icons/profile.svg" width="24" height="24" alt="Perfil" style="filter: invert(1);">
    </button>
</header>

<!-- BANNER DE DESTAQUE (Deixa o app mais chamativo) -->
<div class="banner">
    <div class="banner-conteudo">
        <small>Novidade</small>
        <h2>Lançamentos da Semana</h2>
        <p>Descubra os novos louvores para abençoar o seu dia.</p>
        <button>
            <img src="assets/icons/play.svg" width="16" height="16" alt="Play">
            Ouvir Agora
        </button>
    </div>
</div>

<!-- SEÇÃO: MAIS OUVIDAS -->
<section class="secao" id="secaoMaisOuvidas" style="display: none;">
    <div class="secao-header">
        <h3>Mais Ouvidas no Mundo</h3>
    </div>
    <div id="maisOuvidas" class="carrossel"></div>
</section>

<!-- SEÇÃO: SEUS FAVORITOS -->
<section class="secao" id="secaoFavoritos" style="display: none;">
    <div class="secao-header">
        <h3>Seus Favoritos</h3>
    </div>
    <div id="favoritosHorizontal" class="carrossel"></div>
</section>

<!-- SEÇÃO: ÚLTIMAS OUVIDAS -->
<section class="secao" id="secaoContinue" style="display: none;">
    <div class="secao-header">
        <h3>Últimas ouvidas</h3>
    </div>
    <div id="continueOuvindo" class="carrossel"></div>
</section>

<!-- SEÇÃO DE ÁLBUNS -->
<section class="secao">
    <div class="secao-header">
        <h3>Navegar por Álbuns</h3>
    </div>
    <div id="albuns" class="carrossel"></div>
</section>

<!-- LISTA PRINCIPAL (VERTICAL) -->
<section class="secao">
    <div class="secao-header">
        <h3 id="tituloListaMusicas">Adicionados recentemente</h3>
    </div>
    <div id="listaMusicas"></div>
</section>

<!-- MINI PLAYER UNIFICADO COM GLASSMORPHISM -->
<div class="mini-player" id="miniPlayer" style="display: none;">
    <!-- Barra de Progresso Superior -->
    <div class="progress-container">
        <input type="range" id="progressBar" value="0" min="0" max="100">
        <div class="progress-times">
            <span id="currentTime">0:00</span>
            <span id="durationTime">0:00</span>
        </div>
    </div>

    <!-- Controles Principais -->
    <div class="player-controls-row">
        <!-- Esquerda: Capa e Info -->
        <div class="info-wrapper">
            <img id="miniCapa" src="assets/icons/album.svg" onerror="this.src='assets/icons/album.svg'" alt="Capa">
            <div class="mini-info">
                <strong id="miniTitulo">Nenhuma música</strong>
                <small id="miniArtista">Selecione uma música</small>
            </div>
        </div>

        <!-- Centro: Favorito -->
        <button id="btnFavorito" class="btn-icon" onclick="toggleFavorito()">
            <img src="assets/icons/heart.svg" id="imgFavorito" alt="Favoritar">
        </button>

        <!-- Direita: Controles -->
        <div class="mini-botoes">
            <button id="btnShuffle" class="btn-icon" onclick="alternarShuffle()">
                <img src="assets/icons/shuffle.svg" alt="Aleatório">
            </button>
            <button class="btn-icon" onclick="anterior()">
                <img src="assets/icons/previous.svg" alt="Anterior">
            </button>
            <button id="btnPlay" onclick="playPause()">
                <img src="assets/icons/play.svg" alt="Reproduzir">
            </button>
            <button class="btn-icon" onclick="proxima()">
                <img src="assets/icons/next.svg" alt="Próxima">
            </button>
            <button id="btnRepeat" class="btn-icon" onclick="alternarRepeat()">
                <img src="assets/icons/repeat.svg" alt="Repetir">
            </button>
        </div>
    </div>
</div>

<!-- MENU DE NAVEGAÇÃO INFERIOR -->
<nav class="menu">
    <button class="active" onclick="carregarTela()">
        <img src="assets/icons/home.svg" alt="Início">
        <span>Início</span>
    </button>
    <button onclick="event.preventDefault();">
        <img src="assets/icons/library.svg" alt="Biblioteca">
        <span>Biblioteca</span>
    </button>
    <button onclick="event.preventDefault();">
        <img src="assets/icons/profile.svg" alt="Perfil">
        <span>Perfil</span>
    </button>
</nav>

<audio id="audioPlayer"></audio>
<script src="js/player.js"></script>
<script src="js/ranking.js"></script>
<script src="js/app.js"></script>
    
</body>
</html>
