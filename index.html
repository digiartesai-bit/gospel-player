<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#081826">
  
  <!-- Manifest e PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="#0d233a">
  <!-- CORRIGIDO: de class="apple-touch-icon" para rel="apple-touch-icon" -->
  <link rel="apple-touch-icon" href="assets/icone-192.png">
  
  <title>AdoraPlay</title>
  <meta name="description" content="Sua música. Sua adoração. Em qualquer lugar." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://digiartesai-bit.github.io/adora-play/" />
  <meta property="og:title" content="AdoraPlay — Conectando Corações na Adoração" />
  <meta property="og:description" content="Sua música. Sua adoração. Em qualquer lugar." />
  <meta property="og:image" content="https://digiartesai-bit.github.io/adora-play/socialpreview.jpg" />

  <!-- Fontes e CSS -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=1.0.5">
</head>
<body>

  <!-- CABEÇALHO -->
 <!-- CABEÇALHO COM A LOGO/TOPO -->
<header class="topo">
  <div class="topo-logo">
    <img src="assets/topo.png" alt="AdoraPlay Logo" class="img-topo">
  </div>
  <div class="header-controls">
    <button id="seu-botao-de-instalar" class="btn-instalar-topo">
      <img src="assets/icons/download.svg" alt="Instalar aplicativo" draggable="false">
      <span>Instalar App</span>
    </button>
  </div>
</header>

  <!-- BANNER DE DESTAQUE -->
  <div class="banner" id="bannerDestaque" style="display: none;">
    <small>Novidade</small>
    <h2>Lançamentos da Semana</h2>
    <p>Descubra os novos louvores para abençoar o seu dia.</p>
    <button id="btnVerLancamentos">
      <img src="assets/icons/play.svg" width="16" height="16" alt="Play"> Ver Lançamentos
    </button>
  </div>

  <!-- TELA VIRTUAL DE LANÇAMENTOS -->
  <div id="telaLancamentos" class="tela-lancamentos" style="display: none;">
    <button id="btnVoltarHome" class="btn-voltar">
      ← Voltar para o Início
    </button>
    <div class="card-lancamento">
      <span class="badge-novidade">Novidade da Semana</span>
      <img id="lancamentoCapa" src="assets/icons/album.svg" alt="Capa do lançamento" class="capa-lancamento">
      <h2 id="lancamentoTitulo">Carregando...</h2>
      <p id="lancamentoArtista">Por favor, aguarde</p>
      
      <!-- REMOVIDO onclick inline: manipulado no JS -->
      <button id="btnOuvirLancamento" class="btn-ouvir-lancamento">
        <img src="assets/icons/play.svg" width="16" height="16" alt="" aria-hidden="true" class="icon-play">
        Ouvir Agora
      </button>
    </div>
  </div>

  <!-- CONTAINER DA BUSCA -->
  <div class="search-container">
    <div class="search-wrapper">
      <img src="assets/icons/search.svg" alt="Buscar" class="search-icon">
      <input type="text" id="search-input" placeholder="Buscar músicas, álbuns ou estilos..." autocomplete="off">
      <div id="resultados-busca-flutuante" class="resultados-sugestao"></div>
    </div>
  </div>

  <!-- SEÇÕES DA PÁGINA -->
  <section class="secao" id="secaoMaisOuvidas" style="display: none;">
    <div class="secao-header"><h3>Mais Ouvidas do AdoraPlay</h3></div>
    <div id="maisOuvidas" class="carrossel"></div>
  </section>

  <section class="secao" id="secaoFavoritos" style="display: none;">
    <div class="secao-header"><h3>Seus Favoritos</h3></div>
    <div id="favoritosHorizontal" class="carrossel"></div>
  </section>

  <section class="secao" id="secaoContinue" style="display: none;">
    <div class="secao-header"><h3>Últimas ouvidas</h3></div>
    <div id="continueOuvindo" class="carrossel"></div>
  </section>

  <section class="secao">
    <div class="secao-header"><h3>Navegar por Álbuns</h3></div>
    <div id="albuns" class="carrossel"></div>
  </section>

  <section class="secao">
    <div class="secao-header"><h3 id="tituloListaMusicas">Adicionados recentemente</h3></div>
    <div id="listaMusicas"></div>
  </section>

  <!-- MINI PLAYER -->
  <div class="mini-player" id="miniPlayer">
    <div class="progress-container">
      <input type="range" id="progressBar" value="0" min="0" max="100">
      <div class="progress-times">
        <span id="currentTime">0:00</span>
        <span id="durationTime">0:00</span>
      </div>
    </div>

    <div class="player-controls-row">
      <div class="info-wrapper">
        <img id="miniCapa" src="assets/icons/album.svg" onerror="this.src='assets/icons/album.svg'" alt="Capa da música">
        <div class="mini-info">
          <strong id="miniTitulo">Nenhuma música</strong>
          <small id="miniArtista">Selecione uma música</small>
        </div>
      </div>

      <button class="btn-icon" id="btnFavoritar" title="Adicionar aos favoritos">
        <img src="assets/icons/heart.svg" id="imgFavorito" alt="Favoritar">
      </button>

     <button class="btn-icon" id="btnCompartilhar" title="Compartilhar">
      <img src="assets/icons/whatsapp.svg" alt="Compartilhar no WhatsApp" width="22" height="22">
    </button>

      <div class="mini-botoes">
        <button id="btnShuffle" class="btn-icon" title="Modo aleatório">
          <img src="assets/icons/shuffle.svg" alt="Aleatório">
        </button>
        <button id="btnAnterior" class="btn-icon" title="Anterior">
          <img src="assets/icons/previous.svg" alt="Anterior">
        </button>
        <button id="btnPlay" class="btn-icon" title="Reproduzir / Pausar">
          <img src="assets/icons/play.svg" alt="Reproduzir">
        </button>
        <button id="btnProxima" class="btn-icon" title="Próxima">
          <img src="assets/icons/next.svg" alt="Próxima">
        </button>
        <button id="btnRepeat" class="btn-icon" title="Repetir">
          <img src="assets/icons/repeat.svg" alt="Repetir">
        </button>
      </div>
    </div>
  </div>

  <audio id="audioPlayer"></audio>

  <!-- SCRIPTS COM VERSIONAMENTO UNIFICADO (v=1.0.2) -->
  <script src="js/player.js?v=1.0.2"></script>
  <script src="js/visualizer.js?v=1.0.2"></script>
  <script src="js/ranking.js?v=1.0.2"></script>
  <script src="js/recursos.js?v=1.0.2"></script>
  <script src="js/app.js?v=1.0.2"></script>
  <script src="js/banner.js?v=1.0.2"></script>
  <script src="js/ajuda.js?v=1.0.2"></script>
  <script src="js/pesquisa.js?v=1.0.2"></script>
</body>
</html>
